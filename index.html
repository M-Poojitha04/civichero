<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Gracefully prevent cross-origin 'Script error.' from causing test harness crashes in the sandboxed preview iframe
      window.onerror = function(message, source, lineno, colno, error) {
        if (message === 'Script error.' || !source) {
          return true; // prevents firing default handler
        }
        return false;
      };
      window.addEventListener('error', function(e) {
        if (e.message === 'Script error.' || !e.filename) {
          e.preventDefault();
          e.stopPropagation();
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && (e.reason.message === 'Script error.' || !e.reason.stack)) {
           e.preventDefault();
           e.stopPropagation();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
